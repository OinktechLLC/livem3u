name: LiveM3U Auto Update with Proxy

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-playlists:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run IPTV Scanner with Proxy secure-272717.tatnet.app
        run: |
          echo "🚀 Запуск сканера через прокси secure-272717.tatnet.app..."
          if [ -f "scanner.py" ]; then
            python scanner.py
          elif [ -f "src/bot.py" ]; then
            python src/bot.py --once
          else
            echo "❌ Ошибка: scanner.py или src/bot.py не найдены!"
            exit 1
          fi
        env:
          PYTHONUNBUFFERED: "1"
          PROXY_HOST: "secure-272717.tatnet.app"
          PROXY_PORT: "8080"
      
      - name: Configure Git
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
      
      - name: Commit and push changes
        run: |
          git add -A
          if git diff --staged --quiet; then
            echo "✅ Изменений нет"
          else
            git commit -m "🤖 Автообновление плейлистов $(date '+%Y-%m-%d %H:%M:%S') [Proxy: secure-272717.tatnet.app]"
            git push
            echo "✅ Обновление успешно отправлено в репозиторий!"
          fi
